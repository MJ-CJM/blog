version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /var/www/blog:/var/www/blog:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - waline

  waline:
    image: lizheming/waline:latest
    restart: unless-stopped
    volumes:
      - /data/waline:/app/data
    environment:
      - TZ=Asia/Shanghai

volumes:
  caddy_data:
  caddy_config:
